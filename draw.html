<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>抽籤</title>
</head>

<body>

<h1>🎋 抽籤</h1>

<button onclick="draw()">開始抽籤</button>

<div id="result"></div>

<script>
function draw(){
  const num = Math.floor(Math.random() * 49) + 1;

  document.getElementById("result").innerHTML = 
    "<h2>第 " + num + " 籤</h2>" +
    "<img src='images/" + num + ".jpg' width='300'>";
}
</script>

</body>
</html>
