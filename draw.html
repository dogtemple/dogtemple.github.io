<script>
document.getElementById("loginBtn").addEventListener("click", function(){

  alert("按鈕有動"); // 👉 測試1

  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(() => {
      alert("登入成功 🙏");
    })
    .catch((error) => {
      alert("錯誤：" + error.code); // 👉 把錯誤碼顯示出來
    });

});
</script>
