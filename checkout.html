<!DOCTYPE html>
<html>
<body>
<h2>結帳</h2>

<div id="list"></div>
<h3 id="total"></h3>

<form>
  姓名：<input><br>
  地址：<input><br>
  <button type="submit">送出訂單（匯款）</button>
</form>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let html = "";

cart.forEach(item=>{
  html += `<p>${item.name} - $${item.price}</p>`;
  total += item.price;
});

document.getElementById("list").innerHTML = html;
document.getElementById("total").innerText = "總金額：" + total;
</script>

</body>
</html>
